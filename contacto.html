<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Viajero AMBA</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="stylesheet" href="./css/styles.css">
    <style>
        @keyframes flash-bg {
            0% {
                background-color: inherit;
            }

            50% {
                background-color: #fff8e1;
            }

            100% {
                background-color: inherit;
            }
        }

        .content-refreshed {
            animation: flash-bg 0.8s ease-out;
        }
    </style>
</head>

<body>
    <header class="top-header" id="topHeader" aria-hidden="true">
        <span class="top-header-title">Viajero AMBA</span>
    </header>

    <div class="app-shell">
        <main id="appViews">
            <section id="view-contacto" class="view active">
                <div class="hero-card">
                    <div class="hero-icon" aria-hidden="true">💬</div>
                    <h2>Estudio infoTech</h2>
                    <p class="hero-text">Desarrollo de aplicaciones móviles y soluciones digitales.</p>
                    <a class="link-button back-button contact-home-link" href="./index.html">← Volver</a>
                    <div class="status-list contact-info-list">
                        <article class="status-item">
                            <div>
                                <p class="status-title">Desarrollador</p>
                                <p class="line-meta">Estudio infoTech</p>
                            </div>
                        </article>
                        <article class="status-item">
                            <div>
                                <p class="status-title">Ubicación</p>
                                <p class="line-meta">Catedral de La Plata, Buenos Aires</p>
                                <p class="line-meta">Coordenadas: -34.9215, -57.9536</p>
                            </div>
                        </article>
                    </div>
                    <div class="contact-map"
                        aria-label="Mapa de la oficina de Estudio infoTech en la Catedral de La Plata">
                        <iframe title="Ubicación de Estudio infoTech"
                            src="https://www.openstreetmap.org/export/embed.html?bbox=-57.9636%2C-34.9315%2C-57.9436%2C-34.9115&amp;layer=mapnik&amp;marker=-34.9215%2C-57.9536"
                            loading="lazy">
                        </iframe>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <nav class="bottom-nav" aria-label="Navegación principal">
        <a class="nav-link" href="./index.html" data-view="home">Home</a>
        <a class="nav-link" href="./favoritos.html" data-view="favoritos">Favoritos</a>
        <a class="nav-link" href="./historial.html" data-view="historial">Historial</a>
        <a class="nav-link nav-link-active" href="./contacto.html" data-view="contacto">Contacto</a>
    </nav>

    <script type="module" src="./js/main.js"></script>
</body>

</html>
